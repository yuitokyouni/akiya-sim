<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>マクロ時系列 — 空き家ABM</title>
<style>
  :root{--ink:#22313a;--ink2:#5b6b74;--line:#d3dad8;--paper:#eef1f0;--panel:#fff;--a:#22313a;--b:#c04a2a}
  *{box-sizing:border-box}
  body{margin:0;font-family:"Hiragino Sans","Yu Gothic UI","Noto Sans JP",system-ui,sans-serif;
    background:var(--paper);color:var(--ink);font-size:14px;line-height:1.6}
  header{padding:18px 24px 10px;border-bottom:1px solid var(--line);background:var(--panel)}
  header h1{margin:0;font-size:18px}
  header p{margin:4px 0 0;color:var(--ink2);font-size:13px}
  nav{font-size:13px;margin-top:8px} nav a{margin-right:14px;color:#2a6ac0}
  .wrap{display:grid;grid-template-columns:260px 1fr;gap:16px;padding:16px 24px 32px;max-width:1200px;margin:0 auto}
  @media(max-width:800px){.wrap{grid-template-columns:1fr}}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:14px}
  .panel h2{margin:0 0 10px;font-size:12px;color:var(--ink2);letter-spacing:.06em}
  label{display:flex;justify-content:space-between;font-size:12.5px;margin:6px 0 3px}
  input[type=range]{width:100%;accent-color:var(--b)}
  input[type=number]{width:72px;font:inherit;padding:3px 6px}
  button{font:inherit;padding:6px 14px;border:1px solid var(--ink);background:var(--ink);color:#fff;border-radius:4px;cursor:pointer;margin-top:8px}
  canvas.chart{width:100%;height:220px;border:1px solid var(--line);border-radius:6px;background:#fff;display:block;margin-top:10px}
  .legend{display:flex;flex-wrap:wrap;gap:10px;font-size:11.5px;color:var(--ink2);margin-top:8px}
  .sw{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:4px}
  .num{font-family:ui-monospace,Menlo,monospace}
  table{font-size:12px;width:100%;border-collapse:collapse;margin-top:10px}
  th,td{border:1px solid var(--line);padding:5px 8px;text-align:right}
  th:first-child,td:first-child{text-align:left}
</style>
</head>
<body>
<header>
  <h1>マクロ変数の時系列</h1>
  <p>状態別セル数・率の推移（ベースライン vs 介入、同一シード）。</p>
  <nav>
    <a href="map.html">地図ビュー</a>
    <a href="mechanism.html">政策メカニズム</a>
    <a href="akiya_abm_tokyo.html">格子ビュー</a>
  </nav>
</header>
<div class="wrap">
  <aside class="panel">
    <h2>実行</h2>
    <label>シード <input id="seed" type="number" value="42"></label>
    <label>年数 <input id="years" type="number" value="60" min="10" max="80"></label>
    <label>課税 <span class="num" id="vTax">2.0%</span></label>
    <input type="range" id="tax" min="0" max="3" step="0.1" value="2">
    <label>補助 <span class="num" id="vSub">150万</span></label>
    <input type="range" id="sub" min="0" max="200" step="10" value="150">
    <button type="button" id="btnRun">▶ 再計算</button>
  </aside>
  <div>
    <div class="panel">
      <h2>空き家率・更地率・放置率（%）</h2>
      <canvas class="chart" id="chartRate" width="900" height="220"></canvas>
      <div class="legend">
        <span><i class="sw" style="background:var(--a)"></i>空き家（ベース）</span>
        <span><i class="sw" style="background:var(--b)"></i>空き家（介入）</span>
        <span><i class="sw" style="background:#888"></i>更地（ベース）</span>
        <span><i class="sw" style="background:#e08060"></i>更地（介入）</span>
      </div>
    </div>
    <div class="panel" style="margin-top:14px">
      <h2>状態別セル数（介入ワールド）</h2>
      <canvas class="chart" id="chartStock" width="900" height="220"></canvas>
      <div class="legend">
        <span><i class="sw" style="background:#aeb9be"></i>居住</span>
        <span><i class="sw" style="background:#8fa8a0"></i>賃貸</span>
        <span><i class="sw" style="background:#d9a441"></i>売出/募集</span>
        <span><i class="sw" style="background:#c04a2a"></i>放置</span>
        <span><i class="sw" style="background:#4a5560"></i>更地</span>
      </div>
    </div>
    <div class="panel" style="margin-top:14px">
      <h2>60年時点スナップショット</h2>
      <table id="snapTbl"><thead><tr><th>指標</th><th>ベース</th><th>介入</th><th>差分</th></tr></thead><tbody></tbody></table>
    </div>
  </div>
</div>

<script src="data/zone_grid.gen.js"></script>
<script src="data/zones_vac.gen.js"></script>
<script src="engine.js"></script>
<script>
"use strict";
const {
  W, H, N, zone, makeWorld, step,
  S_OCC, S_RENT, S_SALE, S_LIST, S_NEG, S_DEMO,
} = AkiyaEngine;

function countStates(st) {
  const c = { occ: 0, rent: 0, sale: 0, list: 0, neg: 0, demo: 0, active: 0 };
  for (let i = 0; i < N; i++) {
    if (zone[i] < 0) continue;
    if (st[i] === S_DEMO) { c.demo++; continue; }
    c.active++;
    if (st[i] === S_OCC) c.occ++;
    else if (st[i] === S_RENT) c.rent++;
    else if (st[i] === S_SALE) c.sale++;
    else if (st[i] === S_LIST) c.list++;
    else if (st[i] === S_NEG) c.neg++;
  }
  return c;
}

function simulate(seed, policy, years) {
  const w = makeWorld(seed, policy);
  const series = { stocks: [countStates(w.st)] };
  for (let y = 0; y < years; y++) {
    step(w);
    series.stocks.push(countStates(w.st));
  }
  return { hist: w.hist, series };
}

function drawLines(cv, seriesList, colors, labels, yMax) {
  const cx = cv.getContext("2d");
  const pad = 36;
  cx.clearRect(0, 0, cv.width, cv.height);
  cx.strokeStyle = "#d3dad8";
  cx.fillStyle = "#5b6b74";
  cx.font = "10px ui-monospace";
  for (let g = 0; g <= 4; g++) {
    const yy = pad / 2 + (cv.height - pad) * (1 - g / 4);
    cx.beginPath();
    cx.moveTo(pad, yy);
    cx.lineTo(cv.width - 8, yy);
    cx.stroke();
    cx.fillText((yMax * g / 4).toFixed(0) + (yMax <= 1 ? "" : ""), 4, yy + 3);
  }
  const L = seriesList[0].length;
  seriesList.forEach((s, si) => {
    cx.strokeStyle = colors[si];
    cx.lineWidth = si < 2 ? 2 : 1.5;
    cx.setLineDash(si >= 2 ? [4, 3] : []);
    cx.beginPath();
    s.forEach((v, i) => {
      const xx = pad + (cv.width - pad - 8) * i / Math.max(L - 1, 1);
      const yy = pad / 2 + (cv.height - pad) * (1 - v / yMax);
      if (i) cx.lineTo(xx, yy);
      else cx.moveTo(xx, yy);
    });
    cx.stroke();
    cx.setLineDash([]);
  });
}

function drawStacked(cv, stocks) {
  const cx = cv.getContext("2d");
  const pad = 36;
  cx.clearRect(0, 0, cv.width, cv.height);
  const keys = ["occ", "rent", "sale", "list", "neg", "demo"];
  const cols = ["#aeb9be", "#8fa8a0", "#d9a441", "#d9a441", "#c04a2a", "#4a5560"];
  const L = stocks.length;
  const maxT = Math.max(...stocks.map((s) => s.active + s.demo));
  for (let i = 0; i < L; i++) {
    const s = stocks[i];
    const tot = s.active + s.demo;
    const barW = (cv.width - pad - 8) / L * 0.85;
    const x0 = pad + (cv.width - pad - 8) * i / Math.max(L - 1, 1) - barW / 2;
    let yBase = cv.height - 8;
    keys.forEach((k, ki) => {
      const h = (s[k] / maxT) * (cv.height - pad);
      yBase -= h;
      cx.fillStyle = cols[ki];
      cx.fillRect(x0, yBase, barW, h);
    });
  }
}

function run() {
  const seed = +document.getElementById("seed").value || 42;
  const years = +document.getElementById("years").value || 60;
  const tax = +document.getElementById("tax").value;
  const sub = +document.getElementById("sub").value;
  const A = simulate(seed, { tax: 0, sub: 0 }, years);
  const B = simulate(seed, { tax, sub }, years);
  const vacA = A.hist.vac.map((v) => v * 100);
  const vacB = B.hist.vac.map((v) => v * 100);
  const demoA = A.hist.demo.map((v) => v * 100);
  const demoB = B.hist.demo.map((v) => v * 100);
  const yMax = Math.max(20, ...vacA, ...vacB, ...demoB) * 1.1;
  drawLines(document.getElementById("chartRate"), [vacA, vacB, demoA, demoB],
    ["#22313a", "#c04a2a", "#888", "#e08060"], [], yMax);
  drawStacked(document.getElementById("chartStock"), B.series.stocks);
  const cA = A.series.stocks[A.series.stocks.length - 1];
  const cB = B.series.stocks[B.series.stocks.length - 1];
  const totA = cA.active + cA.demo;
  const totB = cB.active + cB.demo;
  const rows = [
    ["空き家率", (A.hist.vac.at(-1) * 100).toFixed(1) + "%", (B.hist.vac.at(-1) * 100).toFixed(1) + "%"],
    ["放置率", (A.hist.neg.at(-1) * 100).toFixed(1) + "%", (B.hist.neg.at(-1) * 100).toFixed(1) + "%"],
    ["更地率", (A.hist.demo.at(-1) * 100).toFixed(1) + "%", (B.hist.demo.at(-1) * 100).toFixed(1) + "%"],
    ["居住セル", cA.occ, cB.occ],
    ["放置セル", cA.neg, cB.neg],
    ["更地セル", cA.demo, cB.demo],
  ];
  document.querySelector("#snapTbl tbody").innerHTML = rows.map(([k, a, b]) => {
    const da = typeof a === "number" ? b - a : "";
    return `<tr><td>${k}</td><td class="num">${a}</td><td class="num">${b}</td><td class="num">${da}</td></tr>`;
  }).join("");
}

document.getElementById("btnRun").onclick = run;
document.getElementById("tax").oninput = (e) => {
  document.getElementById("vTax").textContent = (+e.target.value).toFixed(1) + "%";
};
document.getElementById("sub").oninput = (e) => {
  document.getElementById("vSub").textContent = e.target.value + "万";
};
run();
</script>
</body>
</html>
