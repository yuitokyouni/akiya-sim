<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>空き家ダイナミクス — 地図ビュー</title>
<link href="https://cdn.jsdelivr.net/npm/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<style>
  :root{
    --ink:#e8ecef; --ink2:#9aa8b2; --panel:rgba(22,28,36,.92);
    --line:#3a4654; --accent:#c04a2a;
    --c-occ:#aeb9be; --c-rent:#8fa8a0; --c-list:#d9a441;
    --c-neg:#c04a2a; --c-demo:#4a5560;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:"Hiragino Sans","Yu Gothic UI","Noto Sans JP",system-ui,sans-serif;
    font-size:14px;color:var(--ink);background:#121820}
  /* filter は WebGL 地図を壊すので使わない — タイル側で暗くする */
  #map-wrap{position:absolute;inset:0}
  #map{width:100%;height:100%;background:#1a2332}
  #panel{position:absolute;top:12px;left:12px;width:280px;background:var(--panel);border:1px solid var(--line);
    border-radius:8px;padding:14px;z-index:2;backdrop-filter:blur(6px)}
  #panel h1{margin:0 0 4px;font-size:15px;font-weight:700}
  #panel p{margin:0 0 10px;font-size:11.5px;color:var(--ink2);line-height:1.5}
  label.row{display:flex;justify-content:space-between;align-items:center;font-size:12.5px;margin:8px 0 4px}
  input[type=range]{width:100%;accent-color:var(--accent)}
  input[type=number]{width:72px;padding:3px 6px;border:1px solid var(--line);border-radius:4px;
    background:#0f141a;color:var(--ink);font:inherit}
  .btns{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  button{font:inherit;font-size:12.5px;padding:5px 12px;border:1px solid var(--ink);border-radius:4px;
    background:var(--ink);color:#121820;cursor:pointer}
  button.ghost{background:transparent;color:var(--ink);border-color:var(--line)}
  button.active{background:var(--accent);border-color:var(--accent);color:#fff}
  button:disabled{opacity:.45;cursor:default}
  .stats{font-size:12px;color:var(--ink2);margin-top:10px;line-height:1.7}
  .stats b{color:var(--ink);font-family:ui-monospace,monospace}
  .legend{display:flex;flex-wrap:wrap;gap:8px;font-size:11px;color:var(--ink2);margin-top:8px}
  .legend span{display:inline-flex;align-items:center;gap:4px}
  .sw{width:10px;height:10px;border-radius:2px;display:inline-block}
  #notice{position:absolute;bottom:12px;left:12px;right:12px;max-width:640px;font-size:11.5px;color:var(--ink2);
    background:rgba(18,24,32,.88);border:1px solid var(--line);border-radius:6px;padding:8px 12px;z-index:2}
  #tile-warn,#js-err{position:absolute;top:12px;right:12px;max-width:420px;font-size:11px;
    background:rgba(18,24,32,.92);border-radius:6px;padding:6px 10px;z-index:3;display:none}
  #tile-warn{color:#f0c080;border:1px solid #6a5030}
  #js-err{color:#ffb4b4;border:1px solid #6a3030;white-space:pre-wrap}
  .num{font-family:ui-monospace,monospace;font-variant-numeric:tabular-nums}
</style>
</head>
<body>
<div id="map-wrap"><div id="map"></div></div>
<div id="tile-warn">背景タイル取得失敗 — カラム表示は継続</div>
<div id="js-err"></div>
<aside id="panel">
  <h1>空き家ダイナミクス <span style="font-weight:400;color:var(--ink2)">地図ビュー</span></h1>
  <p>格子を東京都本土部へアフィン射影した統計的可視化。1セル≠1建物。</p>
  <label class="row">シード <input id="seed" type="number" value="42"></label>
  <label class="row">表示
    <span>
      <button type="button" id="btnBase" class="active">ベースライン</button>
      <button type="button" id="btnPol" class="ghost">介入</button>
    </span>
  </label>
  <label class="row">年 <span class="num" id="yearLbl">0</span></label>
  <input type="range" id="year" min="0" max="60" step="1" value="0">
  <label class="row">空き家課税（介入） <span class="num" id="vTax">0%</span></label>
  <input type="range" id="tax" min="0" max="3" step="0.1" value="0">
  <label class="row">解体補助（介入） <span class="num" id="vSub">0万</span></label>
  <input type="range" id="sub" min="0" max="200" step="10" value="0">
  <label class="row"><input type="checkbox" id="plateau"> PLATEAU建物（3D Tiles）</label>
  <div class="btns">
    <button type="button" id="btnRun">▶ 60年実行</button>
    <button type="button" id="btnPlay" class="ghost">アニメ</button>
    <button type="button" id="btnReset" class="ghost">リセット</button>
  </div>
  <div class="stats">
    空き家率 <b class="num" id="vac">–</b> · 放置 <b class="num" id="neg">–</b> · クラスタ <b class="num" id="clu">–</b>
  </div>
  <div class="legend">
    <span><i class="sw" style="background:var(--c-occ)"></i>居住</span>
    <span><i class="sw" style="background:var(--c-rent)"></i>賃貸</span>
    <span><i class="sw" style="background:var(--c-list)"></i>売出</span>
    <span><i class="sw" style="background:var(--c-neg)"></i>放置</span>
    <span><i class="sw" style="background:var(--c-demo)"></i>更地</span>
  </div>
</aside>
<div id="notice"><strong>様式化・統計的表示</strong> — 84×26 抽象格子を地理院タイル上へアフィン射影したものです。
  セル位置・高さはモデル出力の統計量（近傍空き家率・状態）であり、実在建物の位置を示しません。</div>

<script src="engine.js"></script>
<!-- deck.gl/mapbox は内部で mapbox-gl を import する → maplibre-gl に差し替え -->
<script type="importmap">
{
  "imports": {
    "mapbox-gl": "https://cdn.jsdelivr.net/npm/maplibre-gl@4.7.1/+esm",
    "maplibre-gl": "https://cdn.jsdelivr.net/npm/maplibre-gl@4.7.1/+esm",
    "@deck.gl/mapbox": "https://cdn.jsdelivr.net/npm/@deck.gl/mapbox@9.0.35/+esm",
    "@deck.gl/core": "https://cdn.jsdelivr.net/npm/@deck.gl/core@9.0.35/+esm",
    "@deck.gl/layers": "https://cdn.jsdelivr.net/npm/@deck.gl/layers@9.0.35/+esm",
    "@deck.gl/geo-layers": "https://cdn.jsdelivr.net/npm/@deck.gl/geo-layers@9.0.35/+esm",
    "@loaders.gl/core": "https://cdn.jsdelivr.net/npm/@loaders.gl/core@4.2.5/+esm",
    "@loaders.gl/3d-tiles": "https://cdn.jsdelivr.net/npm/@loaders.gl/3d-tiles@4.2.5/+esm"
  }
}
</script>
<script type="module">
function showErr(msg) {
  const el = document.getElementById("js-err");
  el.textContent = msg;
  el.style.display = "block";
}

try {
  if (typeof AkiyaEngine === "undefined") throw new Error("engine.js が読み込めません。map.html と同じフォルダに engine.js があるか確認してください。");

  const maplibregl = (await import("maplibre-gl")).default;
  if (!maplibregl?.Map) throw new Error("maplibre-gl の読み込みに失敗しました");
  const { MapboxOverlay } = await import("@deck.gl/mapbox");
  const { ColumnLayer } = await import("@deck.gl/layers");
  const { Tile3DLayer } = await import("@deck.gl/geo-layers");
  const { Tiles3DLoader } = await import("@loaders.gl/3d-tiles");

  const E = AkiyaEngine;
  const {
    W, H, N, zone, COLORS, makeWorld, neighborVac, step,
    S_SALE, S_NEG, S_DEMO,
  } = E;

  const AFFINE = { lon0: 138.95, lon1: 139.93, latN: 35.82, latS: 35.53 };
  function gridToLngLat(x, y) {
    const lon = AFFINE.lon0 + (x / (W - 1)) * (AFFINE.lon1 - AFFINE.lon0);
    const lat = AFFINE.latN - (y / (H - 1)) * (AFFINE.latN - AFFINE.latS);
    return [lon, lat];
  }

  const CELLS = [];
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const i = y * W + x;
      if (zone[i] < 0) continue;
      CELLS.push({ i, position: gridToLngLat(x, y) });
    }
  }

  const PLATEAU_URL =
    "https://api.plateauview.mlit.go.jp/datacatalog/3dtiles/13-bldg-lod1-latest/tileset.json";

  function hexRgb(hex) {
    const n = parseInt(hex.slice(1), 16);
    return [(n >> 16) & 255, (n >> 8) & 255, n & 255, 220];
  }

  function pct(v) { return (v * 100).toFixed(1) + "%"; }

  function simulate(seed, policy, years) {
    const w = makeWorld(seed, policy);
    const snaps = [new Uint8Array(w.st)];
    for (let t = 0; t < years; t++) {
      step(w);
      snaps.push(new Uint8Array(w.st));
    }
    return { hist: w.hist, snaps };
  }

  function columnData(st) {
    const nv = neighborVac({ st });
    return CELLS.map(({ i, position }) => {
      const s = st[i];
      const vacRate = nv[i];
      return {
        position,
        color: hexRgb(COLORS[s]),
        height: 40 + vacRate * 1400,
      };
    });
  }

  let view = "base";
  let simBase = null;
  let simPol = null;
  let playTimer = null;
  let plateauOn = false;
  let overlay = null;

  const map = new maplibregl.Map({
    container: "map",
    style: {
      version: 8,
      sources: {
        gsi: {
          type: "raster",
          tiles: ["https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png"],
          tileSize: 256,
          maxzoom: 18,
          attribution: "地理院タイル",
        },
      },
      layers: [{
        id: "gsi",
        type: "raster",
        source: "gsi",
        paint: {
          "raster-brightness-min": 0.08,
          "raster-brightness-max": 0.45,
          "raster-saturation": -0.35,
        },
      }],
    },
    center: [139.72, 35.66],
    zoom: 9.2,
    pitch: 50,
    bearing: -15,
    antialias: true,
  });

  map.on("error", () => {
    document.getElementById("tile-warn").style.display = "block";
  });

  overlay = new MapboxOverlay({ interleaved: true, layers: [] });

  function currentSim() {
    return view === "base" ? simBase : simPol;
  }

  function renderLayers() {
    if (!overlay) return;
    const sim = currentSim();
    const yr = +document.getElementById("year").value;
    const layers = [];
    if (sim) {
      layers.push(new ColumnLayer({
        id: "cells",
        data: columnData(sim.snaps[yr]),
        diskResolution: 8,
        radius: 320,
        extruded: true,
        pickable: false,
        elevationScale: 1,
        getPosition: (d) => d.position,
        getFillColor: (d) => d.color,
        getElevation: (d) => d.height,
      }));
    }
    if (plateauOn) {
      layers.push(new Tile3DLayer({
        id: "plateau-bldg",
        data: PLATEAU_URL,
        loader: Tiles3DLoader,
        opacity: 0.35,
        onTileError: () => {},
      }));
    }
    overlay.setProps({ layers });
  }

  function statsFromSt(st) {
    let vac = 0, neg = 0, tot = 0;
    for (let i = 0; i < N; i++) {
      if (zone[i] < 0 || st[i] === S_DEMO) continue;
      tot++;
      if (st[i] >= S_SALE && st[i] <= S_NEG) {
        vac++;
        if (st[i] === S_NEG) neg++;
      }
    }
    const nv2 = neighborVac({ st });
    let s = 0, c = 0;
    for (let i = 0; i < N; i++) {
      if (zone[i] >= 0 && st[i] >= S_SALE && st[i] <= S_NEG) {
        s += nv2[i];
        c++;
      }
    }
    const vr = tot ? vac / tot : 0;
    const clu = c && vr > 0 ? s / c / vr : 0;
    return { vac: vr, neg: tot ? neg / tot : 0, clu };
  }

  function refreshStats() {
    const sim = currentSim();
    const yr = +document.getElementById("year").value;
    document.getElementById("yearLbl").textContent = String(yr);
    if (!sim) return;
    renderLayers();
    const stats = yr === 0 ? statsFromSt(sim.snaps[yr]) : {
      vac: sim.hist.vac[yr - 1],
      neg: sim.hist.neg[yr - 1],
      clu: sim.hist.clu[yr - 1],
    };
    document.getElementById("vac").textContent = pct(stats.vac);
    document.getElementById("neg").textContent = pct(stats.neg);
    document.getElementById("clu").textContent = stats.clu.toFixed(2);
  }

  function runSimulation() {
    const seed = +document.getElementById("seed").value || 42;
    const tax = +document.getElementById("tax").value;
    const sub = +document.getElementById("sub").value;
    document.getElementById("btnRun").disabled = true;
    document.getElementById("btnRun").textContent = "計算中…";
    setTimeout(() => {
      simBase = simulate(seed, { tax: 0, sub: 0 }, 60);
      simPol = simulate(seed, { tax, sub }, 60);
      document.getElementById("year").value = "0";
      document.getElementById("btnRun").disabled = false;
      document.getElementById("btnRun").textContent = "▶ 60年実行";
      refreshStats();
    }, 0);
  }

  map.on("load", () => {
    map.addControl(overlay);
    runSimulation();
  });

  document.getElementById("year").oninput = refreshStats;
  document.getElementById("btnBase").onclick = () => {
    view = "base";
    document.getElementById("btnBase").className = "active";
    document.getElementById("btnPol").className = "ghost";
    refreshStats();
  };
  document.getElementById("btnPol").onclick = () => {
    view = "pol";
    document.getElementById("btnBase").className = "ghost";
    document.getElementById("btnPol").className = "active";
    refreshStats();
  };
  document.getElementById("tax").oninput = (e) => {
    document.getElementById("vTax").textContent = (+e.target.value).toFixed(1) + "%";
  };
  document.getElementById("sub").oninput = (e) => {
    document.getElementById("vSub").textContent = e.target.value + "万";
  };
  document.getElementById("btnRun").onclick = runSimulation;
  document.getElementById("btnReset").onclick = () => {
    if (playTimer) clearInterval(playTimer);
    playTimer = null;
    document.getElementById("btnPlay").textContent = "アニメ";
    document.getElementById("year").value = "0";
    runSimulation();
  };
  document.getElementById("btnPlay").onclick = (e) => {
    if (playTimer) {
      clearInterval(playTimer);
      playTimer = null;
      e.target.textContent = "アニメ";
      return;
    }
    if (!simBase) runSimulation();
    let yr = +document.getElementById("year").value;
    e.target.textContent = "停止";
    playTimer = setInterval(() => {
      yr++;
      if (yr > 60) {
        clearInterval(playTimer);
        playTimer = null;
        e.target.textContent = "アニメ";
        return;
      }
      document.getElementById("year").value = String(yr);
      refreshStats();
    }, 200);
  };
  document.getElementById("plateau").onchange = (e) => {
    plateauOn = e.target.checked;
    renderLayers();
  };

} catch (err) {
  console.error(err);
  showErr("初期化エラー: " + (err?.message || err) + "\n\nネットワークで CDN (jsdelivr) がブロックされていないか、DevTools Console を確認してください。");
}
</script>
</body>
</html>
